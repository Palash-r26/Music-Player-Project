<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe - Music Player</title>
    <style>
      
        * { box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); /* Purple & Orange Gradient */
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 10;
            justify-content: space-between;
        }

        header img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            border-radius: 50%;
        }

        .brand h1, header h1 {
            font-size: 1.25em;
            margin: 0;
            color: #ffcc00;
            font-weight: 700;
        }

        nav {
            margin-left: auto;
            display: flex;
            gap: 12px;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            margin-right: 40px; /* nudge nav slightly left from the edge */
        }
        /* prevent nav items from wrapping into unexpected places on very small screens */
        @media (max-width: 520px) {
            nav { gap: 8px; }
            header h1, .brand h1 { font-size: 1em; }
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffcc00; 
        }

        .main-container {
            width: 100%;
            max-width: none;
            padding: 120px 8%;
            margin: 0 auto 50px;
            display: block;
            flex: 1 0 auto;
            text-align: center;
        }

        /* center a fixed-width categories box so all buttons are same length */
        .categories {
            width: 100%;
            margin: 0 auto;
            padding: 28px 36px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
        }

        .song-category {
            font-size: 1.4em;
            padding: 14px 18px;
            margin: 10px 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .song-category:hover {
            background: linear-gradient(to right, #ffcc00, #ff7e5f); 
        }

        .song-list {
            display: flex;
            flex-wrap: nowrap; /* prefer single row */
            gap: 24px;
            margin-top: 18px;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        .song-item {
            text-align: center;
            flex: 0 0 calc((100% - 48px) / 3); /* three items per row, account for two gaps */
            max-width: calc((100% - 48px) / 3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .song-item img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .song-item img:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        /* make song links more visible */
        .song-item a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: 600;
        }

        /* small screens: allow wrapping if necessary */
        @media (max-width: 860px) {
            .song-list { flex-wrap: wrap; }
            .song-item { flex: 0 0 45%; }
        }
        @media (max-width: 520px) {
            .song-item { flex: 0 0 100%; }
            .categories { padding: 16px; }
        }

        
        .playing-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
        }

        .close-btn:hover {
            color: red;
        }

        .playing-area img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .playing-area h3 {
            margin: 10px 0;
            font-size: 1em;
            text-align: center;
            color: #ffcc00; 
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 10px;
        }

        .controls button {
            background: linear-gradient(to right, #43cea2, #185a9d); 
            color: #fff;
            border: none;
            padding: 8px 12px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: linear-gradient(to right, #feb47b, #ff7e5f); 
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 0.9em;
        }

        /* ensure footer stays after content */
        main { flex: 1 0 auto; }
    </style>
</head>
<body>

    <header>
    <div class="brand">
        <a href="new.html" aria-label="Vibe - Music Player" style="display:flex; align-items:center; text-decoration:none; color:inherit;">
            <img src="vibe.png" alt="Vibe">
            <h1 style="margin-left:10px;">Vibe</h1>
        </a>
    </div>
    <nav>
        <a href="landing.html#home">Home</a>
        <a href="landing.html#about">About</a>
    </nav>
</header>

<div class="main-container" id="home">
    <div class="categories">
        <div class="song-category" onclick="toggleSongs('Retro')">Retro</div>
        <div id="Retro" class="song-list hidden"></div>
        <div class="song-category" onclick="toggleSongs('Rap')">Rap</div>
        <div id="Rap" class="song-list hidden"></div>
        <div class="song-category" onclick="toggleSongs('Classical')">Classical</div>
        <div id="Classical" class="song-list hidden"></div>
    </div>
</div>


<div id="playingArea" class="playing-area">
    <button id="closePlayingArea" class="close-btn" onclick="closePlayingArea()">×</button>
    <img id="playingImg" src="" alt="Now Playing">
    <h3 id="playingTitle">Now Playing: Select a Song</h3>
    <audio id="audioPlayer" controls></audio>
    <div class="controls">
        <button onclick="previousSong()">⏮ Prev</button>
        <button onclick="togglePlayPause()">▶/⏸</button>
        <button onclick="nextSong()">⏭ Next</button>
        <button onclick="toggleRepeat()">🔁 Repeat</button>
    </div>
</div>

<footer>
    <p>&copy; 2025 Vibe. Back to <a href="landing.html" style="color:#ffcc00; text-decoration:none;">Home</a></p>
</footer>

<script src="new.js"></script>
</body>
</html>
